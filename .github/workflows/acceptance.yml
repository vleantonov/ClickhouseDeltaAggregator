name: Acceptance Tests

on:
  schedule:
    # Nightly at 03:00 UTC — the full exactly-once suite is slow.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "Scenario regex to run (-run), e.g. TestExactlyOnce_KeeperNodeDown"
        required: false
        default: ".*"

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  acceptance:
    name: exactly-once acceptance suite
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: tests/go.sum

      # Acceptance tests drive the live stack (stop/pause/partition containers),
      # so the full cluster — aggregators, generator, YDB, ClickHouse, Keeper —
      # must be running.
      - name: Bring up full cluster
        run: docker compose -f deployments/docker-compose.yaml up --build -d

      # The suite dials YDB at grpc://localhost:2135; discovery may advertise the
      # in-compose hostname "ydb", so it must resolve on the host.
      - name: Map ydb host
        run: echo "127.0.0.1 ydb" | sudo tee -a /etc/hosts

      - name: Wait for ClickHouse
        run: ./.github/scripts/wait-clickhouse.sh

      - name: Initialise schema
        run: ./.github/scripts/init-db.sh

      - name: Run acceptance suite
        env:
          TEST: ${{ github.event.inputs.test || '.*' }}
          # ubuntu-latest ships the `docker compose` v2 plugin, not the standalone
          # `docker-compose` v1 binary the harness defaults to.
          COMPOSE_BIN: "docker compose"
        run: cd tests && go test -tags acceptance -v -timeout 90m -count=1 -run "$TEST" ./...

      - name: Dump cluster logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yaml logs --tail 300

      - name: Tear down
        if: always()
        run: docker compose -f deployments/docker-compose.yaml down -v
